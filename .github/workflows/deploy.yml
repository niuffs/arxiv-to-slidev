name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm install -g @slidev/cli @slidev/theme-default

      # Build CN (with base / so Vue Router hash is clean)
      - name: Build CN
        run: |
          cd examples/cn
          npx slidev build slides.md --base /
          # Fix asset paths in HTML for subdirectory deployment
          sed -i "s|href=\"/assets/|href=\"/arxiv-to-slidev/cn/assets/|g" dist/index.html
          sed -i "s|src=\"/assets/|src=\"/arxiv-to-slidev/cn/assets/|g" dist/index.html
          mkdir -p ../../_site/cn && cp -r dist/* ../../_site/cn/

      # Build EN
      - name: Build EN
        run: |
          cd examples/en
          npx slidev build slides.md --base /
          # Fix asset paths in HTML for subdirectory deployment
          sed -i "s|href=\"/assets/|href=\"/arxiv-to-slidev/en/assets/|g" dist/index.html
          sed -i "s|src=\"/assets/|src=\"/arxiv-to-slidev/en/assets/|g" dist/index.html
          mkdir -p ../../_site/en && cp -r dist/* ../../_site/en/

      # Deploy
      - uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
