name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm install -g @slidev/cli @slidev/theme-default

      # Build CN
      - name: Build CN
        run: |
          cd examples/cn
          npx slidev build slides.md --base /arxiv-to-slidev/cn/
          cat > /tmp/fix.js << 'FIXEOF'
          var fs=require('fs'), h=fs.readFileSync('dist/index.html','utf8');
          var s='<script>(function(){var p=history.pushState,r=history.replaceState;'+
          'history.pushState=function(s,t,u){if(u&&u.indexOf("#/arxiv-to-slidev/")>=0)'+
          'u=u.replace(/#\\/arxiv-to-slidev\\/cn\\//g,"#/");return p.call(this,s,t,u)};'+
          'history.replaceState=function(s,t,u){if(u&&u.indexOf("#/arxiv-to-slidev/")>=0)'+
          'u=u.replace(/#\\/arxiv-to-slidev\\/cn\\//g,"#/");return r.call(this,s,t,u)};'+
          'var x=location.hash;if(x&&x.indexOf("/arxiv-to-slidev/")>=0)'+
          'history.replaceState(null,"",location.pathname+"#/"+x.replace("#/","").replace(/\\/arxiv-to-slidev\\/cn\\//g,""))'+
          '})()</script>';
          fs.writeFileSync('dist/index.html',h.replace('</head>',s+'</head>'));
          FIXEOF
          node /tmp/fix.js
          mkdir -p ../../_site/cn && cp -r dist/* ../../_site/cn/

      # Build EN
      - name: Build EN
        run: |
          cd examples/en
          npx slidev build slides.md --base /arxiv-to-slidev/en/
          cat > /tmp/fix.js << 'FIXEOF'
          var fs=require('fs'), h=fs.readFileSync('dist/index.html','utf8');
          var s='<script>(function(){var p=history.pushState,r=history.replaceState;'+
          'history.pushState=function(s,t,u){if(u&&u.indexOf("#/arxiv-to-slidev/")>=0)'+
          'u=u.replace(/#\\/arxiv-to-slidev\\/en\\//g,"#/");return p.call(this,s,t,u)};'+
          'history.replaceState=function(s,t,u){if(u&&u.indexOf("#/arxiv-to-slidev/")>=0)'+
          'u=u.replace(/#\\/arxiv-to-slidev\\/en\\//g,"#/");return r.call(this,s,t,u)};'+
          'var x=location.hash;if(x&&x.indexOf("/arxiv-to-slidev/")>=0)'+
          'history.replaceState(null,"",location.pathname+"#/"+x.replace("#/","").replace(/\\/arxiv-to-slidev\\/en\\//g,""))'+
          '})()</script>';
          fs.writeFileSync('dist/index.html',h.replace('</head>',s+'</head>'));
          FIXEOF
          node /tmp/fix.js
          mkdir -p ../../_site/en && cp -r dist/* ../../_site/en/

      # Deploy
      - uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
