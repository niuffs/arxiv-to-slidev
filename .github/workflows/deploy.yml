name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm install -g @slidev/cli @slidev/theme-default

      - name: Build CN
        run: |
          cd examples/cn
          npx slidev build slides.md --base /arxiv-to-slidev/cn/
          # Prevent vite:preloadError from throwing (CSS timing bug)
          sed -i 's|</head>|<script>window.addEventListener("vite:preloadError",function(e){e.preventDefault()})</script></head>|' dist/index.html
          mkdir -p ../../_site/cn && cp -r dist/* ../../_site/cn/

      - name: Build EN
        run: |
          cd examples/en
          npx slidev build slides.md --base /arxiv-to-slidev/en/
          sed -i 's|</head>|<script>window.addEventListener("vite:preloadError",function(e){e.preventDefault()})</script></head>|' dist/index.html
          mkdir -p ../../_site/en && cp -r dist/* ../../_site/en/

      - name: Root redirect
        run: |
          cat > _site/index.html << 'EOF'
          <!DOCTYPE html><html><head><meta charset="utf-8"><meta http-equiv="refresh" content="0;url=./cn/"><title>Redirecting</title></head><body><a href="./cn/">arxiv-to-slidev</a></body></html>
          EOF

      - uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
