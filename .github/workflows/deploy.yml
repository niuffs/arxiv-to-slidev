name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm install -g @slidev/cli @slidev/theme-default

      - name: Build CN
        run: |
          cd examples/cn
          npx slidev build slides.md --base /arxiv-to-slidev/cn/
          # Inject preloadError fix + hash fix (string ops, no regex escaping issues)
          sed -i 's|</head>|<script>window.addEventListener("vite:preloadError",function(e){e.preventDefault()});setInterval(function(){var h=location.hash;if(h.indexOf("#/arxiv-to-slidev/")===0){var p=h.split("/");var s=p[p.length-1];if(s)history.replaceState(null,"","#/"+s)}},100);</script></head>|' dist/index.html
          mkdir -p ../../_site/cn && cp -r dist/* ../../_site/cn/

      - name: Build EN
        run: |
          cd examples/en
          npx slidev build slides.md --base /arxiv-to-slidev/en/
          sed -i 's|</head>|<script>window.addEventListener("vite:preloadError",function(e){e.preventDefault()});setInterval(function(){var h=location.hash;if(h.indexOf("#/arxiv-to-slidev/")===0){var p=h.split("/");var s=p[p.length-1];if(s)history.replaceState(null,"","#/"+s)}},100);</script></head>|' dist/index.html
          mkdir -p ../../_site/en && cp -r dist/* ../../_site/en/

      - name: Root redirect + 404.html SPA fallback + static slides
        run: |
          cat > _site/index.html << 'EOF'
          <!DOCTYPE html><html><head><meta charset="utf-8"><meta http-equiv="refresh" content="0;url=./cn/"><title>Redirecting</title></head><body><a href="./cn/">arxiv-to-slidev</a></body></html>
          EOF
          cat > _site/404.html << 'SPAEOF'
          <!DOCTYPE html><html><head><meta charset="utf-8"><title>Redirecting</title><script>
          (function(){
            var p = location.pathname;
            var m;
            if (m = p.match(/^\/arxiv-to-slidev\/(cn|en)\/(.+)$/)) {
              var slide = m[2];
              if (slide && !slide.match(/^(assets|figures)/)) {
                location.replace('/arxiv-to-slidev/' + m[1] + '/#/' + slide);
                return;
              }
            }
            if (p.indexOf('/arxiv-to-slidev/cn/') >= 0) location.replace('/arxiv-to-slidev/cn/');
            else if (p.indexOf('/arxiv-to-slidev/en/') >= 0) location.replace('/arxiv-to-slidev/en/');
            else location.replace('/arxiv-to-slidev/');
          })();
          </script></head><body></body></html>
          SPAEOF
          # Generate static HTML files for each slide (60 slides)
          for lang in cn en; do
            for i in $(seq 1 60); do
              mkdir -p "_site/$lang/$i"
              cat > "_site/$lang/$i/index.html" << SLIDEEOF
          <!DOCTYPE html><html><head><meta charset="utf-8"><meta http-equiv="refresh" content="0;url=../#/$i"><title>Slide $i</title></head><body><a href="../#/$i">Slide $i</a></body></html>
          SLIDEEOF
            done
          done

      - uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
