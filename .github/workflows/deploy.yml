name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm install -g @slidev/cli @slidev/theme-default

      - name: Build CN
        run: |
          cd examples/cn
          npx slidev build slides.md --base /arxiv-to-slidev/cn/
          # Inject hash fix via temp script (avoids YAML/bash/Node triple escaping issues)
          cat > /tmp/fix_hash.js << 'FIXEOF'
          var fs = require('fs');
          var html = fs.readFileSync('dist/index.html', 'utf8');
          var script = '<script>' +
            'window.addEventListener("vite:preloadError",function(e){e.preventDefault()});' +
            '(function(){' +
            'var i=setInterval(function(){' +
            'var h=location.hash;' +
            'var m=h.match(/^#\/(?:arxiv-to-slidev\/(?:cn|en)\/(.+)$/);' +
            'if(m&&m[1]!=="1")history.replaceState(null,"","#"+m[1])' +
            '},100);' +
            'window.addEventListener("popstate",function(){' +
            'var h=location.hash;' +
            'var m=h.match(/^#\/(?:arxiv-to-slidev\/(?:cn|en)\/(.+)$/);' +
            'if(m)history.replaceState(null,"","#"+m[1])' +
            '})})();</script>';
          html = html.replace('</head>', script + '</head>');
          fs.writeFileSync('dist/index.html', html);
          console.log('Hash fix injected');
          FIXEOF
          node /tmp/fix_hash.js
          mkdir -p ../../_site/cn && cp -r dist/* ../../_site/cn/

      - name: Build EN
        run: |
          cd examples/en
          npx slidev build slides.md --base /arxiv-to-slidev/en/
          cat > /tmp/fix_hash.js << 'FIXEOF'
          var fs = require('fs');
          var html = fs.readFileSync('dist/index.html', 'utf8');
          var script = '<script>' +
            'window.addEventListener("vite:preloadError",function(e){e.preventDefault()});' +
            '(function(){' +
            'var i=setInterval(function(){' +
            'var h=location.hash;' +
            'var m=h.match(/^#\/(?:arxiv-to-slidev\/(?:cn|en)\/(.+)$/);' +
            'if(m&&m[1]!=="1")history.replaceState(null,"","#"+m[1])' +
            '},100);' +
            'window.addEventListener("popstate",function(){' +
            'var h=location.hash;' +
            'var m=h.match(/^#\/(?:arxiv-to-slidev\/(?:cn|en)\/(.+)$/);' +
            'if(m)history.replaceState(null,"","#"+m[1])' +
            '})})();</script>';
          html = html.replace('</head>', script + '</head>');
          fs.writeFileSync('dist/index.html', html);
          console.log('Hash fix injected');
          FIXEOF
          node /tmp/fix_hash.js
          mkdir -p ../../_site/en && cp -r dist/* ../../_site/en/

      - name: Root redirect + 404.html
        run: |
          # Root → redirect to CN
          cat > _site/index.html << 'EOF'
          <!DOCTYPE html><html><head><meta charset="utf-8"><meta http-equiv="refresh" content="0;url=./cn/"><title>Redirecting</title></head><body><a href="./cn/">arxiv-to-slidev</a></body></html>
          EOF
          # 404.html: SPA fallback — converts unknown paths to hash routes
          cat > _site/404.html << 'SPAEOF'
          <!DOCTYPE html><html><head><meta charset="utf-8"><title>Redirecting</title><script>
          (function(){
            var path = location.pathname;
            var match;
            if (match = path.match(/^\/arxiv-to-slidev\/(cn|en)\/(.+)$/)) {
              var lang = match[1];
              var slide = match[2];
              if (slide && !slide.startsWith('assets/') && !slide.startsWith('figures/')) {
                location.replace('/arxiv-to-slidev/' + lang + '/#' + slide);
                return;
              }
            }
            if (path.startsWith('/arxiv-to-slidev/cn/')) location.replace('/arxiv-to-slidev/cn/');
            else if (path.startsWith('/arxiv-to-slidev/en/')) location.replace('/arxiv-to-slidev/en/');
            else location.replace('/arxiv-to-slidev/');
          })();
          </script></head><body></body></html>
          SPAEOF

      - uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
